<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for mountain layers -->
    <linearGradient id="mountainGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8D8E7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mountainGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7BA7BC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A8FA7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mountainGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E5266;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A4A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mountainGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2A3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#051219;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background mountain layers -->
  <!-- Layer 1 - Lightest -->
  <polygon points="80,180 200,40 320,180" fill="url(#mountainGradient1)" />
  
  <!-- Layer 2 -->
  <polygon points="40,180 120,80 240,180" fill="url(#mountainGradient2)" />
  
  <!-- Layer 3 -->
  <polygon points="160,180 280,60 380,180" fill="url(#mountainGradient2)" />
  
  <!-- Layer 4 - Front mountains -->
  <polygon points="20,180 100,100 180,180" fill="url(#mountainGradient3)" />
  <polygon points="220,180 300,90 380,180" fill="url(#mountainGradient3)" />
  
  <!-- Layer 5 - Darkest front -->
  <polygon points="140,180 200,120 260,180" fill="url(#mountainGradient4)" />
  
  <!-- Network/constellation dots and lines -->
  <g stroke="#4A9EE0" stroke-width="1" fill="#4A9EE0" opacity="0.8">
    <!-- Connection lines -->
    <line x1="100" y1="120" x2="150" y2="100" />
    <line x1="150" y1="100" x2="200" y2="80" />
    <line x1="200" y1="80" x2="250" y2="110" />
    <line x1="250" y1="110" x2="300" y2="130" />
    <line x1="100" y1="120" x2="180" y2="140" />
    <line x1="180" y1="140" x2="250" y2="110" />
    <line x1="150" y1="100" x2="220" y2="120" />
    <line x1="220" y1="120" x2="300" y2="130" />
    
    <!-- Dots/nodes -->
    <circle cx="100" cy="120" r="3" />
    <circle cx="150" cy="100" r="3" />
    <circle cx="200" cy="80" r="3" />
    <circle cx="250" cy="110" r="3" />
    <circle cx="300" cy="130" r="3" />
    <circle cx="180" cy="140" r="2" />
    <circle cx="220" cy="120" r="2" />
    
    <!-- Additional smaller dots -->
    <circle cx="120" cy="110" r="1.5" />
    <circle cx="170" cy="90" r="1.5" />
    <circle cx="230" cy="90" r="1.5" />
    <circle cx="280" cy="120" r="1.5" />
  </g>
  
  <!-- Brand text -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#1E3A4A" letter-spacing="2px">
    ARTICDEV
  </text>
</svg>