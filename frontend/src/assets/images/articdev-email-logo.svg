<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emailGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#B8D8E7;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="emailGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7BA7BC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A8FA7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="emailGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E5266;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A4A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Mountain layers for email -->
  <polygon points="20,60 50,25 80,60" fill="url(#emailGradient1)" />
  <polygon points="40,60 70,20 100,60" fill="url(#emailGradient2)" />
  <polygon points="60,60 90,30 120,60" fill="url(#emailGradient3)" />
  
  <!-- Network connections -->
  <g stroke="#00D4FF" stroke-width="1.5" fill="#00D4FF" opacity="0.9">
    <line x1="50" y1="35" x2="70" y2="30" />
    <line x1="70" y1="30" x2="90" y2="40" />
    <line x1="50" y1="35" x2="85" y2="45" />
    
    <circle cx="50" cy="35" r="2" />
    <circle cx="70" cy="30" r="2" />
    <circle cx="90" cy="40" r="2" />
    <circle cx="85" cy="45" r="1.5" />
  </g>
  
  <!-- Brand text -->
  <text x="100" y="70" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff" letter-spacing="1px">
    ARTICDEV
  </text>
</svg>